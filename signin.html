<!DOCTYPE html>
<html>
<head>
    <title>Sign-In - My Online Shop</title>
    <style>
        body {
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

        
    /* ══ NAVBAR ══ */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 68px;
      background: rgba(30,41,59,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(56,189,248,0.15);
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px; font-weight: 700;
      color: var(--sky); letter-spacing: 1px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo span { color: var(--white); }

    .nav-links { display: flex; align-items: center; gap: 6px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--white);
      font-size: 14px; font-weight: 500;
      padding: 8px 18px; border-radius: 25px;
      transition: background 0.25s, color 0.25s, transform 0.2s;
    }
    .nav-links a:hover { background: var(--mid); transform: translateY(-1px); }
    .nav-links a.active { background: var(--sky); color: var(--dark); font-weight: 600; }

    .nav-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--mid); border-radius: 25px;
      padding: 7px 16px; border: 1px solid transparent;
      transition: border 0.3s;
    }
    .nav-search:focus-within { border-color: var(--sky); }
    .nav-search input {
      background: none; border: none; outline: none;
      color: var(--white); font-size: 13px;
      font-family: 'Outfit', sans-serif; width: 160px;
    }
    .nav-search input::placeholder { color: var(--light); }
    .nav-search svg { color: var(--light); flex-shrink: 0; }

    .nav-cart {
      position: relative; cursor: pointer;
      font-size: 22px; padding: 8px; border-radius: 50%;
      transition: background 0.2s;
    }
    .nav-cart:hover { background: var(--mid); }
    .cart-badge {
      position: absolute; top: 2px; right: 2px;
      background: var(--sky); color: var(--dark);
      font-size: 10px; font-weight: 700;
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }

    .mobile-menu {
      display: none; flex-direction: column;
      background: var(--panel); border-top: 1px solid var(--mid);
      padding: 16px 24px; gap: 4px;
    }
    .mobile-menu a {
      text-decoration: none; color: var(--white);
      font-size: 15px; padding: 10px 14px; border-radius: 10px;
      transition: background 0.2s;
    }
    .mobile-menu a:hover, .mobile-menu a.active { background: var(--sky); color: var(--dark); font-weight: 600; }
    .mobile-menu.open { display: flex; }


        .signin-box {
            background-color: #1e293b; /* Dark Navy Card */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            border: 1px solid #38bdf8; /* Blue Border */
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background-color: #38bdf8; /* Sky Blue */
            color: #0f172a;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: white;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
        }
        /* ══ RESPONSIVE ══ */
    @media(max-width:768px){
      .navbar { padding:0 20px; }
      .nav-links, .nav-search, .nav-cart { display:none; }
      .hamburger { display:flex; }
      .hero, .section { padding:20px 16px 0; }
      .slide { padding:32px 28px; height:260px; }
      .slide-emoji { display:none; }
      .slide-content { max-width:100%; }
      .arrow { width:36px; height:36px; font-size:15px; }
    }
    @media(max-width:480px){
      .slide { height:230px; }
      .slide-content h2 { font-size:20px; }
      .slide-btn { padding:10px 20px; font-size:13px; }
    }
    </style>
</head>
<body>
<!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🛍️ My<span>OnlineShop</span></div>

    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="shop.html">Products</a></li>
      <li><a href="signin.html">Sign In</a></li>
      <li><a href="ab.html">About Us</a></li>
    </ul>

    <div class="nav-search">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search products..."/>
    </div>

    <div class="nav-cart">🛒<div class="cart-badge">3</div></div>

    <div class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </nav> <br>
    <div class="signin-box">
        <h2 style="color: #38bdf8;">Sign-In</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <a href="suc.html"><button>Sign-In</button></a>
        <p><a href="shop.html">Back to Shop</a></p>
    </div>
  <!-- JS -->
  <script>

  function toggleMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.classList.toggle('open');
  }

    const track       = document.getElementById('track');
    const dotsWrap    = document.getElementById('dots');
    const progressBar = document.getElementById('progressBar');
    const slides      = document.querySelectorAll('.slide');
    const total       = slides.length;
    const INTERVAL    = 3500;
    let current = 0, autoTimer;

    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.classList.add('dot');
      if (i === 0) d.classList.add('active');
      d.addEventListener('click', () => { goTo(i); resetTimer(); });
      dotsWrap.appendChild(d);
    });

    function goTo(index) {
      current = (index + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      document.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === current)
      );
      animateProgress();
    }

    function changeSlide(dir) { goTo(current + dir); resetTimer(); }

    function animateProgress() {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        progressBar.style.transition = `width ${INTERVAL}ms linear`;
        progressBar.style.width = '100%';
      }));
    }

    function startTimer() { autoTimer = setInterval(() => goTo(current + 1), INTERVAL); animateProgress(); }
    function resetTimer()  { clearInterval(autoTimer); startTimer(); }

    function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }

    startTimer();
  </script>
</body>
</html>
