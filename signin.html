<!DOCTYPE html>
<html>
<head>
    <title>Sign-In - My Online Shop</title>
    <style>
        body {
            background-color: #0f172a; /* Deep Navy */
            font-family: Arial;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signin-box {
            background-color: #1e293b; /* Dark Navy Card */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            border: 1px solid #38bdf8; /* Blue Border */
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background-color: #38bdf8; /* Sky Blue */
            color: #0f172a;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: white;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
        }
        /* ══ RESPONSIVE ══ */
    @media(max-width:768px){
      .navbar { padding:0 20px; }
      .nav-links, .nav-search, .nav-cart { display:none; }
      .hamburger { display:flex; }
      .hero, .section { padding:20px 16px 0; }
      .slide { padding:32px 28px; height:260px; }
      .slide-emoji { display:none; }
      .slide-content { max-width:100%; }
      .arrow { width:36px; height:36px; font-size:15px; }
    }
    @media(max-width:480px){
      .slide { height:230px; }
      .slide-content h2 { font-size:20px; }
      .slide-btn { padding:10px 20px; font-size:13px; }
    }
    </style>
</head>
<body>

    <div class="signin-box">
        <h2 style="color: #38bdf8;">Sign-In</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <a href="C:\Users\DELL-PC\Desktop\vedantsjadhav\suc.html"><button>Sign-In</button></a>
        <p><a href="C:\Users\DELL-PC\Desktop\vedantsjadhav\shop.html">Back to Shop</a></p>
    </div>

</body>
</html>
